name: Build
on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

permissions:
  contents: read
  issues: read
  checks: write

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive
      - name: Build
        run: |
          rm -fr .build | echo "Removed build folder"
          swift build -c release
